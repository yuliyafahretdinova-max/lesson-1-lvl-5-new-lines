<style>
  :root{
    --blue-deep:#0b3350;
    --blue-mid:#134369;
    --blue-line:#3a6f96;
    --paper:#f6f3ea;
    --accent:#e8823c;
    --accent-2:#6fd0c7;
    --danger:#c1543f;
    --gold:#d9b35a;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .app{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color:var(--blue-deep);
    min-height:100vh;
    color:var(--paper);
    padding:24px 20px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .wrap{max-width:1000px;width:100%;}

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }
  .icon-btn{
    display:flex;align-items:center;justify-content:center;
    width:42px;height:42px;
    background:var(--blue-mid);
    border:1px solid var(--blue-line);
    color:var(--paper);
    border-radius:6px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
    padding:0;
  }
  .icon-btn svg{width:20px;height:20px;stroke:var(--paper);fill:none;}
  .icon-btn:hover{background:#1c5581;}
  .icon-btn:active{transform:translateY(1px);}
  .icon-btn.danger:hover{background:rgba(193,84,63,.25); border-color:var(--danger);}
  .icon-btn:disabled{opacity:.3; cursor:not-allowed;}
  .icon-btn:disabled:hover{background:var(--blue-mid);}
  .spacer{width:1px;height:26px;background:var(--blue-line);margin:0 4px;}

  .counter{
    display:flex;align-items:center;gap:8px;
    background:var(--blue-mid);
    border:1px solid var(--blue-line);
    border-radius:20px;
    padding:8px 16px 8px 12px;
    font-family:'Courier New', monospace;
    font-weight:700;
    font-size:16px;
  }
  .counter svg{width:18px;height:18px;stroke:var(--accent-2);fill:none;}
  .counter.done{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold); color:var(--gold);}
  .counter.done svg{stroke:var(--gold);}
  .counter .sep{color:#5f88a6;font-weight:400;}

  .stage-outer{
    border:1px solid var(--blue-line);
    border-radius:6px;
    background:var(--blue-mid);
    padding:14px;
    display:inline-block;
  }
  .canvas-box{
    position:relative;
  }
  canvas{display:block;background:var(--paper); border-radius:2px;}

  .ruler{
    position:absolute;
    width:420px;
    height:46px;
    transform-origin:center center;
    cursor:grab;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
    touch-action:none;
    user-select:none;
  }
  .ruler:active{cursor:grabbing;}
  .ruler svg{width:100%;height:100%;display:block;overflow:visible;}
  .ruler .edge-rect{transition:fill .1s ease, stroke .1s ease;}
  .ruler.aligned .edge-rect{fill:#eaf6e6; stroke:#4c9a52;}
  .ruler .measure-edge{transition:stroke .1s ease, stroke-width .1s ease;}
  .ruler.aligned .measure-edge{stroke:#2f7a37; stroke-width:3.5;}
  .ruler .handle{
    position:absolute;
    right:-11px;
    top:50%;
    transform:translateY(-50%);
    width:22px;height:22px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid var(--paper);
    cursor:alias;
  }
</style>

<div class="app">
  <div class="wrap">

    <div class="toolbar">
      <button class="icon-btn" id="undoSegBtn" disabled title="Отменить последний отрезок">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 14L4 9l5-5"/>
          <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
        </svg>
      </button>
      <button class="icon-btn danger" id="clearSegBtn" disabled title="Убрать все отрезки">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 5l14 14M19 5L5 19"/>
        </svg>
      </button>
      <div class="spacer"></div>
      <button class="icon-btn" id="downloadBtn" title="Скачать">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"/>
          <path d="M7 10l5 5 5-5"/>
          <path d="M4 19h16"/>
        </svg>
      </button>
      <div class="spacer"></div>
      <div class="counter" title="Отрезков найдено / всего возможно">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="19" r="2" fill="currentColor" stroke="none"/><circle cx="19" cy="5" r="2" fill="currentColor" stroke="none"/><path d="M6 18L18 6"/></svg>
        <span id="numSegs">0</span>
        <span class="sep">/</span>
        <span id="numMax">15</span>
      </div>
      <div class="counter" id="counterDone" style="display:none;" title="Все отрезки найдены">
        <svg viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>

    <div class="stage-outer">
      <div class="canvas-box" id="canvasBox">
        <canvas id="canvas"></canvas>
        <div class="ruler" id="ruler">
          <svg id="rulerSvg" viewBox="0 0 420 46">
            <rect id="edgeRect" class="edge-rect" x="1" y="1" width="418" height="44" rx="4" fill="#e9dcb8" stroke="#7a5a2a" stroke-width="2"/>
            <g id="ticksGroup"></g>
            <line id="measureEdge" class="measure-edge" x1="4" y1="3" x2="416" y2="3" stroke="#b5451b" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <div class="handle" id="rulerHandle"></div>
        </div>
      </div>
    </div>

  </div>
</div>

    for(let i=0;i<points.length;i++){
      for(let j=i+1;j<points.length;j++){
        const d = Math.hypot(points[i].x-points[j].x, points[i].y-points[j].y);
        if(d > maxD) maxD = d;
      }
    }
    return maxD;
  }

  function applyRulerLength(){
    ruler.style.width = RULER_LEN + 'px';
    rulerSvg.setAttribute('viewBox', `0 0 ${RULER_LEN} ${RULER_H}`);
    edgeRect.setAttribute('width', RULER_LEN - 2);
    measureEdge.setAttribute('x2', RULER_LEN - 4);
    buildTicks();
    ALIGN_TOL = RULER_LEN/2 - 10;
  }

  function fitCanvasToImage(image){
    const maxW = Math.min(860, window.innerWidth - 80);
    const maxH = 560;
    let w = image.naturalWidth, h = image.naturalHeight;
    const scale = Math.min(maxW / w, maxH / h, 1);
    canvas.width = Math.round(w * scale);
    canvas.height = Math.round(h * scale);
    canvasBox.style.width = canvas.width + 'px';
    canvasBox.style.height = canvas.height + 'px';
    points = POINT_DEFS.map(p => ({x: p.frac_x*canvas.width, y: p.frac_y*canvas.height, label: p.label}));

    const maxD = farthestPairDistance();
    RULER_LEN = Math.round(maxD * 1.22) + 20;
    applyRulerLength();
    rulerState.cx = canvas.width/2;
    rulerState.cy = canvas.height/2;
    applyRulerTransform();
  }

  function buildTicks(){
    let html = '';
    for(let x = 10; x <= RULER_LEN - 10; x += 10){
      const stepIndex = Math.round((x-10)/10);
      const long = stepIndex % 5 === 0;
      const h = long ? 20 : 11;
      html += `<line x1="${x}" y1="8" x2="${x}" y2="${8+h}" stroke="#7a5a2a" stroke-width="${long?1.6:1}"/>`;
    }
    ticksGroup.innerHTML = html;
  }

  function draw(highlightPair){
    if(!img) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    segments.forEach(s => {
      const p1 = points[s.a], p2 = points[s.b];
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = '#c1543f';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    });

    if(highlightPair){
      const p1 = points[highlightPair.a], p2 = points[highlightPair.b];
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = 'rgba(76,154,82,0.55)';
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    points.forEach((p) => {
      const isHi = highlightPair && (highlightPair.a === points.indexOf(p) || highlightPair.b === points.indexOf(p));
      ctx.beginPath();
      ctx.arc(p.x, p.y, POINT_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = '#0b3350';
      ctx.fill();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = '#f6f3ea';
      ctx.stroke();

      ctx.font = '700 18px Georgia, serif';
      ctx.fillStyle = '#0b3350';
      ctx.strokeStyle = '#f6f3ea';
      ctx.lineWidth = 3.5;
      const tx = p.x + POINT_RADIUS + 6;
      const ty = p.y - POINT_RADIUS - 3;
      ctx.strokeText(p.label, tx, ty);
      ctx.fillText(p.label, tx, ty);
    });
  }

  function updateCounters(){
    numSegsEl.textContent = segments.length;
    const mx = maxSegments(points.length);
    const done = segments.length === mx;
    counterDone.style.display = done ? 'flex' : 'none';
    undoSegBtn.disabled = segments.length === 0;
    clearSegBtn.disabled = segments.length === 0;
  }

  function segExists(a, b){
    return segments.some(s => (s.a===a && s.b===b) || (s.a===b && s.b===a));
  }

  function loadImage(src){
    const image = new Image();
    image.onload = () => {
      img = image;
      segments = [];
      fitCanvasToImage(image);
      draw();
      updateCounters();
    };
    image.src = src;
  }
  loadImage(DEFAULT_IMAGE);

  undoSegBtn.addEventListener('click', () => { segments.pop(); draw(); updateCounters(); });
  clearSegBtn.addEventListener('click', () => { segments = []; draw(); updateCounters(); });
  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'segments.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
  window.addEventListener('resize', () => { if(img){ fitCanvasToImage(img); draw(); } });

  // ---- Ruler: drag to move, handle to rotate, alignment check on release ----
  let rulerState = {cx: 140, cy: 90, angle: 0};
  let dragMode = null;
  let dragStart = {};

  function applyRulerTransform(){
    ruler.style.left = (rulerState.cx - RULER_LEN/2) + 'px';
    ruler.style.top = (rulerState.cy - RULER_H/2) + 'px';
    ruler.style.transform = `rotate(${rulerState.angle}deg)`;
  }
  applyRulerTransform();

  function getAlignedPair(){
    const rad = rulerState.angle * Math.PI/180;
    const dx = Math.cos(rad), dy = Math.sin(rad);
    const nx = -Math.sin(rad), ny = Math.cos(rad);
    // top measuring edge sits half the ruler's height away from center, along the normal
    const edgeCx = rulerState.cx - nx * (RULER_H/2 - 3);
    const edgeCy = rulerState.cy - ny * (RULER_H/2 - 3);
    const onRuler = [];
    points.forEach((p, i) => {
      const vx = p.x - edgeCx, vy = p.y - edgeCy;
      const tAlong = vx*dx + vy*dy;
      const tPerp = vx*nx + vy*ny;
      if(Math.abs(tPerp) <= PERP_TOL && Math.abs(tAlong) <= ALIGN_TOL){
        onRuler.push(i);
      }
    });
    for(let i = 0; i < onRuler.length; i++){
      for(let j = i+1; j < onRuler.length; j++){
        const a = onRuler[i], b = onRuler[j];
        if(!segExists(a,b)) return {a, b};
      }
    }
    return null;
  }

  function checkAlignmentLive(){
    const pair = getAlignedPair();
    ruler.classList.toggle('aligned', !!pair);
    draw(pair);
  }

  ruler.addEventListener('mousedown', (e) => {
    if(e.target === rulerHandle) return;
    dragMode = 'move';
    dragStart = {mx:e.clientX, my:e.clientY, cx:rulerState.cx, cy:rulerState.cy};
    e.preventDefault();
  });
  rulerHandle.addEventListener('mousedown', (e) => {
    dragMode = 'rotate';
    dragStart.startMouseAngle = Math.atan2(e.clientY - rulerState.cy - canvasBox.getBoundingClientRect().top, e.clientX - rulerState.cx - canvasBox.getBoundingClientRect().left) * 180/Math.PI;
    dragStart.angle = rulerState.angle;
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener('mousemove', (e) => {
    if(!dragMode) return;
    const boxRect = canvasBox.getBoundingClientRect();
    if(dragMode === 'move'){
      rulerState.cx = dragStart.cx + (e.clientX - dragStart.mx);
      rulerState.cy = dragStart.cy + (e.clientY - dragStart.my);
    } else if(dragMode === 'rotate'){
      const mouseAngle = Math.atan2(e.clientY - boxRect.top - rulerState.cy, e.clientX - boxRect.left - rulerState.cx) * 180/Math.PI;
      rulerState.angle = dragStart.angle + (mouseAngle - dragStart.startMouseAngle);
    }
    applyRulerTransform();
    checkAlignmentLive();
  });
  window.addEventListener('mouseup', () => {
    if(dragMode){
      const pair = getAlignedPair();
      if(pair){
        segments.push(pair);
      }
      ruler.classList.remove('aligned');
      draw();
      updateCounters();
    }
    dragMode = null;
  });

})();
</script>
